<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Banned Terms Warning</title>
    <style>
      body { font: 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; width: 280px; margin: 0; padding: 12px; }
      h1 { font-size: 14px; margin: 0 0 8px; }
      label { display: flex; align-items: center; gap: 6px; margin: 6px 0; }
      button { width: 100%; margin-top: 8px; padding: 6px; cursor: pointer; }
      .row { display: flex; gap: 6px; }
      .row button { flex: 1; }
      small { color: #666; }
    </style>
  </head>
  <body>
    <h1>Banned Terms Warning</h1>
    <label><input type="checkbox" id="enabled" /> Enabled</label>
    <small id="hostInfo"></small>
    <div class="row">
      <button id="rescan">Rescan tab</button>
      <button id="options">Settings</button>
    </div>
    <button id="toggleHost">Disable on this site</button>
    <script src="popup.js"></script>
  </body>
</html>
