<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Banned Terms Warning</title>
    <style>
      body { font: 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; width: 320px; margin: 0; padding: 12px; }
      h1 { font-size: 14px; margin: 0 0 8px; }
      label { display: flex; align-items: center; gap: 6px; margin: 6px 0; }
      button { width: 100%; padding: 6px; cursor: pointer; }
      .row { display: flex; gap: 6px; }
      .row button { flex: 1; }
      small, .muted { color: #666; font-size: 12px; }
      .matches { margin: 10px 0 6px; border-top: 1px solid #eee; padding-top: 8px; max-height: 220px; overflow: auto; }
      .matches h2 { font-size: 12px; margin: 0 0 6px; color: #555; text-transform: uppercase; letter-spacing: 0.04em; }
      .match { display: flex; align-items: center; justify-content: space-between; gap: 6px; padding: 4px 6px; border-radius: 4px; }
      .match:hover { background: #fafafa; }
      .match .term { font-weight: 600; font-family: ui-monospace, Consolas, monospace; word-break: break-all; }
      .match .count { color: #c0392b; font-variant-numeric: tabular-nums; }
      .match button { width: auto; padding: 2px 8px; font-size: 11px; }
      .none { color: #888; padding: 6px; }
      hr { border: none; border-top: 1px solid #eee; margin: 10px 0; }
    </style>
  </head>
  <body>
    <h1>Banned Terms Warning</h1>
    <label><input type="checkbox" id="enabled" /> Enabled</label>
    <small id="hostInfo"></small>

    <div class="matches">
      <h2>Matches on this page</h2>
      <div id="matchList"><div class="none">No matches.</div></div>
    </div>

    <div class="row">
      <button id="rescan">Rescan</button>
      <button id="options">Settings</button>
    </div>
    <button id="toggleHost" style="margin-top:6px">Disable on this site</button>
    <script src="lib/config.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
