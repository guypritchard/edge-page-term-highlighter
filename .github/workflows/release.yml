name: Release Extension

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.0.1). Must match manifest.json."
        required: true

# Principle of least privilege: only what each job needs.
permissions:
  contents: write   # for creating the GitHub Release
  # Everything else (id-token, pull-requests, actions, ...) stays default-none.

jobs:
  build-and-release:
    runs-on: ubuntu-24.04
    # Hard timeout so a stuck job can't burn quota forever.
    timeout-minutes: 10
    steps:
      - name: Harden runner
        # Restricts the runner's outbound network surface during the job.
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        # Pinned to commit SHA (v4.2.2) to defend against supply-chain
        # compromise of moving tags. Update via Dependabot.
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Determine version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            TAG="v${VERSION}"
          else
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#v}"
          fi
          # Defensive validation: semver only, no shell metacharacters.
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version format: $VERSION"
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved version=${VERSION} tag=${TAG}"

      - name: Verify manifest version matches tag
        shell: bash
        run: |
          MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
          echo "manifest.json version: ${MANIFEST_VERSION}"
          echo "release version:       ${{ steps.ver.outputs.version }}"
          if [ "${MANIFEST_VERSION}" != "${{ steps.ver.outputs.version }}" ]; then
            echo "::error::manifest.json version (${MANIFEST_VERSION}) does not match release version (${{ steps.ver.outputs.version }})."
            exit 1
          fi

      - name: Run unit tests
        shell: bash
        run: node --test test/

      - name: Package extension
        id: pkg
        shell: bash
        run: |
          NAME="edge-banned-terms-warning-${{ steps.ver.outputs.version }}"
          mkdir -p dist staging
          rsync -a \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'dist' \
            --exclude 'staging' \
            --exclude 'test' \
            --exclude 'AGENTS.md' \
            --exclude 'README.md' \
            --exclude 'LICENSE' \
            --exclude '.gitignore' \
            ./ staging/
          (cd staging && zip -r "../dist/${NAME}.zip" .)
          ls -la dist
          echo "zip=dist/${NAME}.zip" >> "$GITHUB_OUTPUT"
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"

      - name: Generate SHA256 checksum
        shell: bash
        run: |
          cd dist
          sha256sum "${{ steps.pkg.outputs.name }}.zip" > "${{ steps.pkg.outputs.name }}.zip.sha256"
          cat "${{ steps.pkg.outputs.name }}.zip.sha256"

      - name: Create GitHub Release
        # Pinned to commit SHA (v2.3.4). Update via Dependabot.
        uses: softprops/action-gh-release@62c96d0c4e8a889135c1f3a25910db8dbe0e85f7 # v2.3.4
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          body: |
            ## Install (Developer Mode)

            1. Download `${{ steps.pkg.outputs.name }}.zip` from the Assets below.
            2. Verify the SHA256 against `${{ steps.pkg.outputs.name }}.zip.sha256`.
            3. Extract the zip to a folder you will keep (Edge loads the extension from disk).
            4. Open Edge and go to `edge://extensions/`.
            5. Toggle **Developer mode** on (bottom-left).
            6. Click **Load unpacked** and select the extracted folder.
            7. Pin the extension from the toolbar puzzle-piece menu.
            8. Click the icon -> **Settings** to add banned terms and per-site rules.

            See the [README](https://github.com/${{ github.repository }}#readme) for full configuration details.
          files: |
            dist/${{ steps.pkg.outputs.name }}.zip
            dist/${{ steps.pkg.outputs.name }}.zip.sha256
