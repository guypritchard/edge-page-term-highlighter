name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Validate manifest.json
        run: |
          node -e "
            const m = require('./manifest.json');
            if (m.manifest_version !== 3) throw new Error('manifest_version must be 3');
            if (!m.version) throw new Error('version missing');
            if (!m.content_security_policy || !m.content_security_policy.extension_pages) {
              throw new Error('content_security_policy.extension_pages is required');
            }
            const csp = m.content_security_policy.extension_pages;
            if (/unsafe-(inline|eval)/.test(csp)) {
              throw new Error('CSP must not contain unsafe-inline or unsafe-eval');
            }
            console.log('manifest OK, version', m.version);
          "

      - name: Lint JS files (syntax check)
        run: |
          for f in background.js content.js popup.js options.js lib/config.js lib/matching.js; do
            echo "Checking $f"
            node --check "$f"
          done

      - name: Run unit tests
        run: node --test test/*.test.js

      - name: Dry-run package
        run: |
          mkdir -p staging
          rsync -a --exclude '.git' --exclude '.github' --exclude 'staging' --exclude 'test' --exclude 'AGENTS.md' --exclude 'README.md' --exclude 'LICENSE' --exclude '.gitignore' ./ staging/
          (cd staging && zip -r ../extension-preview.zip .)
          ls -la extension-preview.zip
